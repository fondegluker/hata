version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: hata-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: hata
      POSTGRES_PASSWORD: hata
      POSTGRES_DB: hata
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hata"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
