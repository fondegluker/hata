version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: hata-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hata
      POSTGRES_PASSWORD: hata
      POSTGRES_DB: hata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hata"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: hata-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://hata:hata@db:5432/hata
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: "false"
      ENVIRONMENT: production
      CORS_ORIGINS: '["http://localhost","http://localhost:80","https://your-domain.com"]'
    volumes:
      - storage_data:/app/storage
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: hata-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  storage_data:
